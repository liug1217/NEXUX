<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CHATBOT</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: SF Pro, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #frame {
      width: 100%;
      height: 100vh;
      background: #ffffff;
      position: relative;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .rect1 {
      box-sizing: border-box;
      position: absolute;
      left: 10px;
      right: 10px;
      height: 58px;
      top: 601px;
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 29px;
      transition: top 0.35s ease;
      z-index: 1;

      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 17px;
    }

    .ellipse2 {
      position: absolute;
      inset: -10px;
      background: #F3F3F3;
      border-radius: 50%;
      z-index: -1;
      display: none;
    }

    /* Rectangle 4 */
    .rect4 {
      box-sizing: border-box;
      position: absolute;
      width: 234px;
      height: 321px;
      left: 50%;
      transform: translateX(-50%);
      top: 647px;
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 15px;
      display: none;
      z-index: 15;
    }

    /* Ellipse 3 (mic click) */
    .ellipse3 {
      position: absolute;
      inset: -10px;
      background: #F3F3F3;
      border-radius: 50%;
      z-index: -1;
      display: none;
    }

    .ellipse1 {
      position: relative;
      width: 36px;
      height: 36px;
      flex: none;
      background: #000000;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .add {
      position: relative;
      flex: 1;
      min-width: 0;
      height: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .mic {
      position: relative;
      width: 16px;
      height: 16px;
      flex: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .arrow {
      position: relative;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .arrow svg {
      width: 100%;
      height: 100%;
    }

    /* 使用者訊息(對話紀錄裡的條目樣式) */
    .rect5 {
      align-self: flex-end;
      max-width: 70%;
      height: auto;
      background: #F4F4F4;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #000;
      padding: 10px 18px;
      box-sizing: border-box;
      white-space: normal;
      word-break: break-word;
    }

    /* 對話紀錄容器(可往上滾動,堆疊顯示) */
    .msg {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 97px;
      bottom: 92px;
      overflow-y: auto;

      display: flex;
      flex-direction: column;
      gap: 14px;

      font-family: Inter, sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      color: #000;
      z-index: 0;
    }

    /* AI 回覆訊息(對話紀錄裡的條目樣式) */
    .ai-msg-entry {
      align-self: flex-start;
      max-width: 90%;
      white-space: pre-line;
      word-break: break-word;
    }

    .add input {
      border: none;
      outline: none;
      font-size: 16px;
      font-weight: 500;
      color: #000;
      background: transparent;
      flex: 1;
      min-width: 0;
      width: 100%;
    }
  .sidebar {
      box-sizing: border-box;
      position: absolute;
      width: 52px;
      height: 100%;
      left: 0px;
      top: 0px;
      background: #FFFFFF;
      border-right: 1px solid #F3F3F3;
    }
/* Rectangle 7 */
    .rect7 {
      position: absolute;
      width: 330px;
      max-width: 80%;
      height: 120px;
      left: 50%;
      transform: translateX(-50%);
      top: 132px;
      background: #000000;
      border-radius: 15px;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .timeText {
      color: #FFFFFF;
      font-size: clamp(28px, 8vw, 60px);
      font-weight: 400;
    }
</style>
</head>
<body>

<div id="frame">
  <div class="sidebar"></div>
  <div class="rect7" id="rect7">
    <div class="timeText" id="timeText">00:00:00</div>
  </div>

  <div class="ellipse2" id="ellipse2"></div>
  <div class="ellipse3" id="ellipse3"></div>

  <div class="msg" id="msg"></div>

  <div class="rect4" id="rect4"></div>

  <div class="rect1" id="rect">
    <div class="add" id="add">
      <div class="ellipse2" id="ellipse2"></div>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M11 13H5V11H11V5H13V11H19V13H13V19H11V13Z" fill="black"/></svg>
      <input type="text" placeholder="想問就問" />
    </div>

    <div class="mic" id="mic">
      <div class="ellipse3" id="ellipse3"></div>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 10C9.10457 10 10 9.10457 10 8V3.33333C10 2.22876 9.10457 1.33333 8 1.33333C6.89543 1.33333 6 2.22876 6 3.33333V8C6 9.10457 6.89543 10 8 10Z" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M12.6667 8C12.6667 10.9455 10.9455 13.3333 8 13.3333C5.05448 13.3333 3.33333 10.9455 3.33333 8" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M8 13.3333V15.3333" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M5.33333 15.3333H10.6667" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </div>

    <div class="ellipse1" id="btn">
      <div class="arrow" id="arrow">
        <svg viewBox="0 0 24 24">
          <path d="M12 18V6" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M7 11l5-5 5 5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
    </div>
  </div>

</div>

<script>
let moved = false;
let ellipseShown = false;
let rect4Shown = false;
let micShown = false;

const rect = document.getElementById("rect");
const rect4 = document.getElementById("rect4");
const btn = document.getElementById("btn");
const add = document.getElementById("add");
const arrow = document.getElementById("arrow");
const input = document.querySelector("input");
const msg = document.getElementById("msg");
const ellipse2 = document.getElementById("ellipse2");
const ellipse3 = document.getElementById("ellipse3");
const mic = document.getElementById("mic");

function typeText(text, el) {
  el.textContent = "";
  let i = 0;
  const timer = setInterval(() => {
    el.textContent += text[i];
    i++;
    msg.scrollTop = msg.scrollHeight;
    if (i >= text.length) clearInterval(timer);
  }, 80);
}

// ===== 瀏覽器內跑開源模型(Transformers.js + Qwen2.5-0.5B-Instruct)=====
// 完全在使用者自己的裝置上運算,不需要任何外部 API,不限人數使用
// 代價:模型比較小,回答品質有限,第一次使用需要下載模型(可能要等一下)
let aiPipelinePromise = null;

async function loadAiModel() {
  if (aiPipelinePromise) return aiPipelinePromise;

  aiPipelinePromise = (async function () {
    const { pipeline } = await import("https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2");
    return await pipeline("text-generation", "Xenova/Qwen2.5-0.5B-Instruct");
  })();

  return aiPipelinePromise;
}

// ===== 持久化記憶(localStorage):每次都重新生成,但會結合之前存的舊資訊一起參考 =====
const MEMORY_KEY = "chatbotMemory";
const MEMORY_MAX_ENTRIES = 20;

function loadMemory() {
  try {
    const raw = localStorage.getItem(MEMORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function saveMemoryEntry(question, answer) {
  const memory = loadMemory();
  memory.push({ q: question, a: answer });

  // 只保留最近 N 筆,避免資料無限長大、塞爆 prompt
  while (memory.length > MEMORY_MAX_ENTRIES) {
    memory.shift();
  }

  try {
    localStorage.setItem(MEMORY_KEY, JSON.stringify(memory));
  } catch (e) {
    // 儲存空間滿了就放棄儲存,不影響當前對話
  }
}

function buildMemoryContext() {
  const memory = loadMemory();
  if (memory.length === 0) return "";

  const lines = memory.map(function (entry) {
    return "問:" + entry.q + " / 答:" + entry.a;
  });

  return "以下是之前累積的問答紀錄,可以參考但不一定要直接複述:\n" + lines.join("\n");
}

async function generateModelReplyAndShow(message, targetEl) {
  try {
    const generator = await loadAiModel();

    const memoryContext = buildMemoryContext();
    const systemContent =
      "你是一個輕鬆活潑的聊天機器人,用簡短的繁體中文回覆(1-2句話以內),語氣親切自然。" +
      (memoryContext ? "\n\n" + memoryContext : "");

    const messages = [
      { role: "system", content: systemContent },
      { role: "user", content: message }
    ];

    const output = await generator(messages, {
      max_new_tokens: 120,
      temperature: 0.7,
      do_sample: true
    });

    let reply = "";
    if (Array.isArray(output) && output[0]) {
      const generated = output[0].generated_text;
      if (Array.isArray(generated)) {
        const last = generated[generated.length - 1];
        reply = (last && last.content) ? last.content : "";
      } else if (typeof generated === "string") {
        reply = generated;
      }
    }

    reply = reply.trim() || "嗯...我好像沒有聽懂,可以換個方式問我嗎";

    typeText(reply, targetEl);

    // 把這次的問答存起來,下次生成時會一起當作參考資訊
    saveMemoryEntry(message, reply);
  } catch (e) {
    typeText("模型載入失敗了,可能是網路問題,請稍後再試一次", targetEl);
  }
}

// 頁面載入時就先在背景開始下載模型,減少使用者真正送出訊息時的等待感
loadAiModel();

function send() {
  

  rect.style.top = "calc(100vh - 88px)";

  const text = input.value.trim();

  if (text === "") return;

  // 新增一筆使用者訊息到對話紀錄裡(堆疊,不覆蓋舊的)
  const userEntry = document.createElement("div");
  userEntry.className = "rect5";
  userEntry.textContent = text;
  msg.appendChild(userEntry);
  msg.scrollTop = msg.scrollHeight;

  let replyParts = [];

    // ===== 問候 =====
  // 修正：允許多意圖輸入（例如「哈囉今天幾月幾日」也會觸發）
  if (text.includes("哈囉") || text.includes("你好") || text.includes("哈啰") || text.includes("嗨") || text.includes("早安") || text.includes("午安") || text.includes("晚安") || text.includes("安安") || text.toLowerCase().includes("hi") || text.toLowerCase().includes("hello")) {
    const base = ["哈囉", "你好", "嗨", "安安"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if ((pick === "你好" || pick === "安安") && Math.random() < 0.7) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    let symbol = "";
    if (Math.random() < 0.7) {
      const symbols = ["～", "！", "✨"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    if (symbol === "～" && Math.random() < 0.7) {
      symbol += "👋";
    }

    replyParts.push(pick + wordTail + symbol);
  }

  // ===== 在嗎 =====
  if (text === "在嗎" || text === "欸" || text === "有人嗎" || text === "在不在" || text === "在家嗎") {
    const base = ["在呀", "怎麼了", "我在", "說吧", "在的", "嗯嗯我在"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if ((pick === "在呀" || pick === "在的") && Math.random() < 0.7) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    replyParts.push(pick + wordTail);
  }

  // ===== 幹嘛 =====
  if (text === "幹嘛" || text === "在幹嘛" || text === "你在幹嘛" || text === "在忙嗎" || text === "在做什麼") {
    const base = ["在發呆", "在等你", "在寫程式", "沒事", "在放空", "在想晚餐吃什麼"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if ((pick === "在發呆" || pick === "在等你" || pick === "在寫程式" || pick === "在放空") && Math.random() < 0.9) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    replyParts.push(pick + wordTail);
  }

  // ===== 現在幾點 =====
  if (((text.includes("現在") || text.includes("今天")) && text.includes("幾點")) || text === "幾點") {
    const now = new Date();
    const hour = now.getHours();
    const minute = now.getMinutes().toString().padStart(2, "0");
    const second = now.getSeconds().toString().padStart(2, "0");

    const base = [
      `現在${hour}:${minute}`,
      `現在是${hour}:${minute}`,
      `${hour}點${minute}分`,
      `${hour}:${minute}`
    ];

    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if ((pick === `現在${hour}:${minute}` || pick === `現在是${hour}:${minute}`) && Math.random() < 0.7) {
      const tails = ["呀", "啊", "囉"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    let symbol = "";
    if (Math.random() < 0.9) {
      const symbols = ["～", "！", "🕒"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    // 顯示時間 UI
    const rect7 = document.getElementById("rect7");
    const timeText = document.getElementById("timeText");
    if (rect7 && timeText) {
      rect7.style.display = "flex";
      timeText.textContent = `${hour}:${minute}:${second}`;
    }

    replyParts.push(pick + wordTail + symbol);
  }

  // ===== 今天日期 =====
  if (text.includes("今天") && (text.includes("幾月") || text.includes("幾日") || text.includes("日期") || text.includes("幾號"))) {
    const now = new Date();
    const month = now.getMonth() + 1;
    const date = now.getDate();

    const base = [
      `今天${month}月${date}日`,
      `今天是${month}月${date}日`,
      `${month}月${date}日`
    ];

    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if (pick === `今天${month}月${date}日` && Math.random() < 0.7) {
      const tails = ["呀", "啊", "囉"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    let symbol = "";
    if (Math.random() < 0.9) {
      const symbols = ["～", "！", "📅"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    replyParts.push(pick + wordTail + symbol);
  }

  // ===== 天氣 =====
  if (text === "今天天氣好好" || text.includes("天氣如何") || text.includes("天氣怎樣") || text === "今天天氣") {
    const base = ["是的", "對", "還不錯呢", "希望是"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if ((pick === "對" || pick === "希望是") && Math.random() < 0.9) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    let symbol = "";
    if (Math.random() < 0.9) {
      const symbols = ["～", "！", "✨", "☀️"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    replyParts.push(pick + wordTail + symbol);
  }

  // ===== 謝謝 =====
  if (text.includes("謝謝") || text.includes("感謝") || text === "thx" || text.toLowerCase().includes("thank")) {
    const base = ["不會啦", "不客氣", "小事一件", "應該的"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let symbol = "";
    if (Math.random() < 0.8) {
      const symbols = ["～", "！", "😊"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    replyParts.push(pick + symbol);
  }

  // ===== 再見 =====
  if (text.includes("再見") || text.includes("掰掰") || text.includes("先這樣") || text === "晚安囉" || text.toLowerCase().includes("bye")) {
    const base = ["掰掰", "再見囉", "下次聊", "先這樣囉"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let symbol = "";
    if (Math.random() < 0.8) {
      const symbols = ["～", "！", "👋"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    replyParts.push(pick + symbol);
  }

  // ===== 自我介紹 =====
  if (text.includes("你是誰") || text.includes("你叫什麼") || text.includes("自我介紹") || text.includes("你叫啥")) {
    const base = ["我是你的小幫手", "我是一個聊天機器人", "我沒有名字耶,你可以幫我取一個"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 是不是機器人/AI =====
  if (text.includes("你是機器人嗎") || text.includes("你是不是AI") || text.includes("你是不是ai") || text.includes("你是真人嗎") || text.includes("你是人嗎")) {
    const base = ["對呀,我是聊天機器人", "是的,我是 AI 助手", "沒錯,我是程式寫的小幫手"];
    let symbol = Math.random() < 0.7 ? ["😄", "🤖", "！"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 讚美 =====
  if (text.includes("你好棒") || text.includes("你好聰明") || text.includes("好厲害") || text.includes("你真好") || text.includes("你很可愛")) {
    const base = ["謝謝你誇獎", "哪裡哪裡", "你也很棒呀", "謝謝你這麼說"];
    let symbol = Math.random() < 0.8 ? ["～", "！", "😊"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 開心 =====
  if (text.includes("我好開心") || text.includes("我很開心") || text.includes("今天好開心") || text.includes("超開心")) {
    const base = ["太好了,陪你一起開心", "聽到這個我也很開心", "開心的事要分享一下嗎"];
    let symbol = Math.random() < 0.8 ? ["！", "🎉", "✨"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 難過/心情不好 =====
  if (text.includes("我好難過") || text.includes("心情不好") || text.includes("我很難過") || text.includes("我不開心") || text.includes("好煩")) {
    const base = ["怎麼了,發生什麼事了嗎", "辛苦了,我在這陪你", "難過的時候記得照顧自己"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 吃飯了嗎 =====
  if (text.includes("吃飯了嗎") || text.includes("吃了嗎") || text.includes("吃飽了嗎") || text === "吃飯沒") {
    const base = ["我不需要吃飯耶,但你記得要吃喔", "你呢,吃了嗎", "別忘記吃飯呀"];
    let symbol = Math.random() < 0.7 ? ["～", "🍚", "！"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 累了/想睡 =====
  if (text.includes("好累") || text.includes("想睡覺") || text.includes("好睏") || text.includes("累死了")) {
    const base = ["辛苦了,早點休息吧", "累的話就先休息一下", "記得不要太累喔"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 無聊 =====
  if (text.includes("好無聊") || text.includes("沒事做") || text.includes("無聊死了")) {
    const base = ["要不要跟我聊聊天", "無聊的話可以問我問題呀", "我可以陪你聊天解悶"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 笑話 =====
  if (text.includes("講笑話") || text.includes("說個笑話") || text.includes("講個笑話")) {
    const base = [
      "為什麼電腦會感冒?因為它打開了太多 Windows",
      "老師問:1+1等於多少?學生說:等於我愛你,因為1+1在一起",
      "為什麼數學課本很難過?因為它有太多問題"
    ];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 今天星期幾 =====
  if (text.includes("星期幾") || text.includes("禮拜幾")) {
    const days = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
    const today = days[new Date().getDay()];
    const base = [`今天${today}`, `今天是${today}`, `${today}呀`];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 閒聊反應詞(嘿嘿/哈哈/喔喔/嗯嗯) =====
  if (text === "嘿嘿" || text === "哈哈" || text === "喔喔" || text === "嗯嗯") {
    const base = ["怎麼了嗎", "嗯?", "哈哈怎麼了", "什麼事呀"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 加油打氣 =====
  if (text.includes("幫我加油") || text.includes("鼓勵我") || text.includes("打氣")) {
    const base = ["加油加油,你可以的!", "相信自己,一定沒問題!", "你已經很努力了,加油!"];
    let symbol = Math.random() < 0.8 ? ["💪", "✨", "！"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 生日 =====
  if (text.includes("生日快樂") || text.includes("今天生日") || text.includes("我生日")) {
    const base = ["生日快樂!", "祝你生日快樂", "希望你今年順順利利"];
    let symbol = Math.random() < 0.8 ? ["🎉", "🎂", "！"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 抱歉/對不起 =====
  if (text.includes("對不起") || text.includes("抱歉")) {
    const base = ["沒關係的", "不用在意啦", "沒事的,別放在心上"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 肚子餓 =====
  if (text.includes("好餓") || text.includes("肚子餓") || text.includes("肚子好餓")) {
    const base = ["要不要去吃點東西", "餓的話記得去吃飯喔", "我聽到你的肚子在叫了"];
    let symbol = Math.random() < 0.7 ? ["～", "🍜", "！"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 感冒/不舒服 =====
  if (text.includes("我感冒了") || text.includes("不舒服") || text.includes("生病了") || text.includes("我生病")) {
    const base = ["要多休息,記得喝水", "趕快去看醫生比較安全", "希望你早點好起來"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 緊張/壓力大 =====
  if (text.includes("好緊張") || text.includes("壓力好大") || text.includes("壓力很大") || text.includes("要考試了")) {
    const base = ["放輕鬆,你已經很努力了", "深呼吸一下,慢慢來", "相信自己,你做得到的"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 放假 =====
  if (text.includes("放假真好") || text.includes("好想放假") || text.includes("終於放假")) {
    const base = ["放假要好好休息", "好好享受假期吧", "放假真的很幸福"];
    let symbol = Math.random() < 0.7 ? ["～", "🎈", "！"][Math.floor(Math.random() * 3)] : "";
    replyParts.push(base[Math.floor(Math.random() * base.length)] + symbol);
  }

  // ===== 想出去玩 =====
  if (text.includes("好想出去玩") || text.includes("想去旅行") || text.includes("想出去玩") || text.includes("好想旅行")) {
    const base = ["哪裡都很適合放鬆一下", "出去走走心情會變好", "說不定可以規劃個小旅行"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 真的假的 =====
  if (text === "真的嗎" || text === "真假" || text === "真的假的") {
    const base = ["真的呀", "千真萬確", "我沒有騙你"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 嘆氣 =====
  if (text === "唉" || text.includes("嘆氣") || text === "唉唉") {
    const base = ["怎麼了,心情不好嗎", "嘆氣了呢,發生什麼事了", "我在這陪你"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 上班/下班 =====
  if (text.includes("要上班了") || text.includes("好想下班") || text.includes("還在上班") || text.includes("好想上班")) {
    const base = ["辛苦了,加油!", "快下班了,堅持一下", "上班辛苦,記得照顧自己"];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== 921大地震 =====
  if (text.includes("921") || text.includes("九二一") || text.includes("集集大地震") || text.includes("車籠埔斷層")) {
    const base = [
      "921大地震發生在1999年9月21日凌晨,芮氏規模7.3,震央在南投集集,造成2415人罹難,是台灣戰後傷亡最慘重的天災",
      "921地震是車籠埔斷層錯動造成的逆斷層型地震,地表破裂帶長達85到100公里,還讓大甲溪河床抬升形成一座新瀑布",
      "921之後台灣新增了「震度七」這個分級,還大幅修改建築耐震規範,並把9月21日訂為國家防災日",
      "921地震讓中寮超高壓變電所毀損,造成中北部大停電,也讓政府後來大力發展地震預警系統,現在手機收到的災防告警就是源自那次教訓"
    ];
    replyParts.push(base[Math.floor(Math.random() * base.length)]);
  }

  // ===== fallback:沒命中規則,改成查 Google 搜尋結果做摘要 =====
  if (replyParts.length === 0) {
    const aiEntry = document.createElement("div");
    aiEntry.className = "ai-msg-entry";
    aiEntry.textContent = "🤖 思考中...(若是第一次使用需要先下載模型,請稍候)";
    msg.appendChild(aiEntry);
    msg.scrollTop = msg.scrollHeight;

    generateModelReplyAndShow(text, aiEntry);
    input.value = "";
    return;
  }

  const reply = replyParts.join("");

  // 新增一筆 AI 回覆訊息到對話紀錄裡,用打字機動畫顯示
  const aiEntry = document.createElement("div");
  aiEntry.className = "ai-msg-entry";
  msg.appendChild(aiEntry);
  typeText(reply, aiEntry);

  input.value = "";
  // moved = true;（已移除，避免只能執行一次）
}

function showEllipse2() {
  if (!ellipseShown) {
    ellipse2.style.display = "block";
    ellipseShown = true;
  }
}

function showRect4() {
  if (!rect4Shown) {
    rect4.style.display = "block";
    rect4Shown = true;
  }
}

function toggleMicEllipse3() {
  micShown = !micShown;
  ellipse3.style.display = micShown ? "block" : "none";
}

btn.onclick = send;
arrow.onclick = send;

add.addEventListener("click", (e) => {
  e.stopPropagation();
  showEllipse2();
  showRect4();
});

mic.addEventListener("click", (e) => {
  e.stopPropagation();
  toggleMicEllipse3();
});

input.addEventListener("click", (e) => e.stopPropagation());
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

const frame = document.getElementById("frame");
frame.addEventListener("click", (e) => {
  const isAdd = e.target.closest && e.target.closest("#add");
  const isRect4 = e.target.closest && e.target.closest("#rect4");
  const isEllipse2 = e.target.closest && e.target.closest("#ellipse2");
  const isMic = e.target.closest && e.target.closest("#mic");

  if (!isAdd && !isRect4 && !isEllipse2 && !isMic) {
    ellipse2.style.display = "none";
    rect4.style.display = "none";
    ellipse3.style.display = "none";
    ellipseShown = false;
    rect4Shown = false;
    micShown = false;
  }
});
</script>

<script>
// ===== 即時時鐘（每秒更新） =====
// ===== 即時時鐘（每秒更新，但僅在送出後顯示） =====
function startClock() {
  const rect7 = document.getElementById("rect7");
  const timeText = document.getElementById("timeText");

  function update() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, "0");
    const m = now.getMinutes().toString().padStart(2, "0");
    const s = now.getSeconds().toString().padStart(2, "0");

    if (timeText) {
      timeText.textContent = `${h}:${m}:${s}`;
    }

    // 不再強制顯示，完全交由 send() 控制
  }

  setInterval(update, 1000);
  update();
}

startClock();
</script>
