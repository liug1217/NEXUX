<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市編輯器</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: SF Pro, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #frame {
      width: 2560px;
      height: 1440px;
      background: #ffffff;
      position: relative;
      box-shadow: 0 20px 80px rgba(0,0,0,0.6);
      overflow: hidden;
    }

    .rect1 {
      box-sizing: border-box;
      position: absolute;
      width: 771px;
      height: 58px;
      left: 921px;
      top: 601px;
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 29px;
      transition: top 0.35s ease;
      z-index: 1;
    }

    .ellipse2 {
      position: absolute;
      width: 36px;
      height: 36px;
      left: 932px;
      top: 612px;
      background: #F3F3F3;
      border-radius: 50%;
      z-index: 9;
      display: none;
    }

    /* Rectangle 4 */
    .rect4 {
      box-sizing: border-box;
      position: absolute;
      width: 234px;
      height: 321px;
      left: 924px;
      top: 647px;
      background: #FFFFFF;
      border: 1px solid #E9E9E9;
      box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
      border-radius: 15px;
      display: none;
      z-index: 15;
    }

    /* Ellipse 3 (mic click) */
        /* Ellipse 3 (mic click) */
    .ellipse3 {
      position: absolute;
      width: 36px;
      height: 36px;
      left: 1604px;
      top: 612px;
      background: #F3F3F3;
      border-radius: 50%;
      z-index: 19;
      display: none;
    }

    .ellipse1 {
      position: absolute;
      width: 36px;
      height: 36px;
      left: 1645px;
      top: 612px;
      background: #000000;
      border-radius: 50%;
      cursor: pointer;
      transition: top 0.35s ease;
      z-index: 20;
    }

    .add {
      position: absolute;
      width: auto;
      min-width: 120px;
      height: 24px;
      left: 938px;
      top: 618px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: top 0.35s ease;
      z-index: 10;
      cursor: pointer;
    }

    .mic {
      position: absolute;
      width: 16px;
      height: 16px;
      left: 1614px;
      top: 622px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: top 0.35s ease;
      z-index: 20;
      cursor: pointer;
    }

    .arrow {
      position: absolute;
      width: 24px;
      height: 24px;
      left: 1651px;
      top: 618px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: top 0.35s ease;
      z-index: 20;
    }

    .rect5 {
      position: absolute;
      height: 44px;
      left: 1631px;
      top: 8px;
      background: #F4F4F4;
      border-radius: 22px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #000;
      padding: 0 15px;
      box-sizing: border-box;
      white-space: nowrap;
      z-index: 50;
    }

    .msg {
      position: absolute;
      left: 923px;
      top: 97px;
      font-family: Inter, sans-serif;
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      color: #000;
      white-space: nowrap;
      z-index: 100;
    }

    .add input {
      border: none;
      outline: none;
      font-size: 16px;
      font-weight: 500;
      color: #000;
      background: transparent;
      width: 200px;
    }
  </style>
</head>
<body>

<div id="frame">

  <div class="ellipse2" id="ellipse2"></div>
  <div class="ellipse3" id="ellipse3"></div>

  <div class="msg" id="msg"></div>
  <div class="rect5" id="rect5"></div>

  <div class="rect1" id="rect"></div>
  <div class="rect4" id="rect4"></div>
  <div class="ellipse1" id="btn"></div>

  <div class="add" id="add">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M11 13H5V11H11V5H13V11H19V13H13V19H11V13Z" fill="black"/></svg>
    <input type="text" placeholder="想問就問" />
  </div>

  <div class="mic" id="mic">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 10C9.10457 10 10 9.10457 10 8V3.33333C10 2.22876 9.10457 1.33333 8 1.33333C6.89543 1.33333 6 2.22876 6 3.33333V8C6 9.10457 6.89543 10 8 10Z" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M12.6667 8C12.6667 10.9455 10.9455 13.3333 8 13.3333C5.05448 13.3333 3.33333 10.9455 3.33333 8" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M8 13.3333V15.3333" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M5.33333 15.3333H10.6667" stroke="black" stroke-width="1.6" stroke-linecap="round"/>
    </svg>
  </div>

  <div class="arrow" id="arrow">
    <svg viewBox="0 0 24 24">
      <path d="M12 18V6" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M7 11l5-5 5 5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    </svg>
  </div>

</div>

<script>
let moved = false;
let ellipseShown = false;
let rect4Shown = false;
let micShown = false;

const rect = document.getElementById("rect");
const rect4 = document.getElementById("rect4");
const btn = document.getElementById("btn");
const add = document.getElementById("add");
const arrow = document.getElementById("arrow");
const rect5 = document.getElementById("rect5");
const input = document.querySelector("input");
const msg = document.getElementById("msg");
const ellipse2 = document.getElementById("ellipse2");
const ellipse3 = document.getElementById("ellipse3");
const mic = document.getElementById("mic");

function typeText(text, el) {
  el.textContent = "";
  let i = 0;
  const timer = setInterval(() => {
    el.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(timer);
  }, 80);
}

function send() {
  if (moved) return;

  rect.style.top = "1352px";
  btn.style.top = "1363px";
  add.style.top = "1369px";
  arrow.style.top = "1369px";
  mic.style.top = "1373px";

  const text = input.value.trim();

  rect5.style.display = "none";
  if (text === "") return;

  rect5.style.display = "flex";
  rect5.textContent = text;

  let reply = "";

  // 哈囉 / 問候
  if (text === "哈囉" || text === "你好" || text === "哈啰" || text === "嗨") {
    const base = ["哈囉", "你好"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if (pick === "你好" && Math.random() < 0.7) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    let symbol = "";
    if ((pick === "哈囉" || pick === "你好" || pick === "嗨") && Math.random() < 0.7) {
      const symbols = ["～", "！", "✨"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    if (symbol === "～" && Math.random() < 0.7) {
      symbol += "👋";
    }

    reply = pick + wordTail + symbol;

  // 在嗎 / 欸
  } else if (text === "在嗎" || text === "欸") {
    const base = ["在", "怎麼了", "我在", "說吧"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if (pick === "在呀" && Math.random() < 0.7) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    reply = pick + wordTail;

  // 幹嘛
  } else if (text === "幹嘛" || text === "在幹嘛") {
    const base = ["在發呆", "在等你", "在寫程式", "沒事"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if ((pick === "在發呆" || pick === "在等你" || pick === "在寫程式") && Math.random() < 0.9) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    reply = pick + wordTail;

  // 謝謝
  } else if (text === "謝謝") {
    const base = ["不客氣", "小事", "OK的", "不用謝"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if (pick === "不客氣" && Math.random() < 0.7) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    reply = pick + wordTail;

  // 掰掰
  } else if (text === "掰掰" || text === "拜拜") {
    const base = ["掰掰", "等等見", "走了喔", "88"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if (pick === "掰掰" && Math.random() < 0.7) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    reply = pick + wordTail;

  // 天氣
  } else if (text === "今天天氣好好") {
    const base = ["是的", "對"];
    const pick = base[Math.floor(Math.random() * base.length)];

    let wordTail = "";
    if (pick === "對" && Math.random() < 0.9) {
      const tails = ["呀", "啊"];
      wordTail = tails[Math.floor(Math.random() * tails.length)];
    }

    let symbol = "";
    if ((pick === "是的" || pick === "對") && Math.random() < 0.9) {
      const symbols = ["～", "！", "✨"];
      symbol = symbols[Math.floor(Math.random() * symbols.length)];
    }

    reply = pick + wordTail + symbol;

  } else {
    reply = "我收到你說：" + text;
  }

  typeText(reply, msg);
  input.value = "";
  moved = true;
}

function showEllipse2() {
  if (!ellipseShown) {
    ellipse2.style.display = "block";
    ellipseShown = true;
  }
}

function showRect4() {
  if (!rect4Shown) {
    rect4.style.display = "block";
    rect4Shown = true;
  }
}

function toggleMicEllipse3() {
  micShown = !micShown;
  ellipse3.style.display = micShown ? "block" : "none";
}

btn.onclick = send;
arrow.onclick = send;

add.addEventListener("click", (e) => {
  e.stopPropagation();
  showEllipse2();
  showRect4();
});

mic.addEventListener("click", (e) => {
  e.stopPropagation();
  toggleMicEllipse3();
});

input.addEventListener("click", (e) => e.stopPropagation());
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

const frame = document.getElementById("frame");
frame.addEventListener("click", (e) => {
  const isAdd = e.target.closest && e.target.closest("#add");
  const isRect4 = e.target.closest && e.target.closest("#rect4");
  const isEllipse2 = e.target.closest && e.target.closest("#ellipse2");
  const isMic = e.target.closest && e.target.closest("#mic");

  if (!isAdd && !isRect4 && !isEllipse2 && !isMic) {
    ellipse2.style.display = "none";
    rect4.style.display = "none";
    ellipse3.style.display = "none";
    ellipseShown = false;
    rect4Shown = false;
    micShown = false;
  }
});
</script>

</body>
</html>
