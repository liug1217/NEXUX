<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山中問答 · 本地語言模型</title>
<style>
  :root {
    --bg: #212121;
    --panel: #2a2a2a;
    --panel-border: rgba(255, 255, 255, 0.1);
    --ink: #ece8de;
    --ink-dim: #9b9b9b;
    --accent: #6f9a6e;
    --accent-soft: rgba(111, 154, 110, 0.16);
    --user-bubble: #2f2f2f;
    --error: #c97b63;
    --pill-bg: rgba(113, 112, 112, 0.2);
    --pill-border: rgba(255, 255, 255, 0.08);
    --serif: "Noto Serif TC", "Songti TC", serif;
    --sans: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 背景加一點極淡的水墨紋理感,呼叫語料裡「山」的意象 */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 0%, rgba(111,154,110,0.06), transparent 60%),
      radial-gradient(ellipse 50% 30% at 100% 100%, rgba(111,154,110,0.04), transparent 60%);
    pointer-events: none;
  }

  /* 左側細窄導覽軌,呼應設計稿裡收合狀態的側欄 */
  .side-rail {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 52px;
    background: rgba(255, 255, 255, 0.03);
    border-right: 1px solid var(--panel-border);
    z-index: 2;
  }

  @media (max-width: 720px) {
    .side-rail { display: none; }
  }

  .app {
    width: 100%;
    max-width: 720px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  @media (min-width: 721px) {
    .app { margin-left: 52px; }
  }

  header {
    padding: 28px 24px 16px;
    border-bottom: 1px solid var(--panel-border);
  }

  header .eyebrow {
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
  }

  header h1 {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 600;
    margin: 6px 0 4px;
    letter-spacing: 0.02em;
  }

  header p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-dim);
    line-height: 1.6;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .messages:empty::before {
    content: "在下方輸入文字,按下送出,模型會接著你的話繼續說下去。";
    color: var(--ink-dim);
    font-size: 14px;
    margin: auto;
    text-align: center;
    max-width: 320px;
    line-height: 1.8;
  }

  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    color: var(--ink);
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-bottom-left-radius: 4px;
  }

  .msg.assistant .label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .msg.error {
    align-self: flex-start;
    background: transparent;
    border: 1px solid var(--error);
    color: var(--error);
    font-size: 13px;
  }

  .msg.loading {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    color: var(--ink-dim);
    font-size: 14px;
  }

  .dots span {
    display: inline-block;
    width: 5px;
    height: 5px;
    margin-right: 3px;
    border-radius: 50%;
    background: var(--ink-dim);
    animation: blink 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.25; }
    40% { opacity: 1; }
  }

  form.composer {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    margin: 0 auto;
    padding: 16px 24px 24px;
    background: var(--bg);
  }

  /* Rectangle 12:圓角膠囊容器,寬度用100%取代原本固定771px,
     內部改成「上方文字區 / 下方工具列」的直向排列,
     這樣工具列才能像設計稿一樣貼齊底部,文字區則可以向上長高 */
  .composer-pill {
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    padding: 14px 17px 17px;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    border-radius: 29px;
    box-shadow: 0px 4px 4px rgba(0, 0, 0, 0.25);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }


  form.composer textarea {
    width: 100%;
    resize: none;
    min-height: 24px;
    max-height: 200px;
    padding: 17px 0 0 17px;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.4;
    outline: none;
  }

  form.composer textarea::placeholder {
    font-family: 'Inter', var(--sans);
    font-style: normal;
    font-weight: 400;
    font-size: 15px;
    line-height: 18px;
    color: #B6B6B6;
  }

  /* 工具列:add 靠左,模型標籤 / Mic / 送出鍵一組靠右,
     對齊方式完全比照設計稿(add / Arrow up 同高、Model 5 / Mic 同高,
     Ellipse 2 的圓心與其餘元件的中心線對齊) */
  .composer-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .toolbar-right {
    display: flex;
    align-items: center;
    gap: 15px;
  }

  /* add:24x24,純圖示、無背景圓,內縮 20.83% / 20.83%,實心白色「+」 */
  .add-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    padding: 0;
    border: none;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 模型 5:Inter, 12px/15px, 純白色文字 */
  .model-tag {
    flex-shrink: 0;
    font-family: 'Inter', var(--sans);
    font-style: normal;
    font-weight: 400;
    font-size: 12px;
    line-height: 15px;
    color: #FFFFFF;
    white-space: nowrap;
  }

  /* Mic:16x16,純圖示、無背景圓,內縮 20.83%(左右)/ 4.17%(上下),1.6px白色線條 */
  .mic-btn {
    flex-shrink: 0;
    width: 16px;
    height: 16px;
    padding: 0;
    border: none;
    background: transparent;
    color: #FFFFFF;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Ellipse 2 + Arrow up:36x36 白底圓形送出鍵,內含 24x24 黑色線條的上箭頭圖示 */
  .send-btn {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: #FFFFFF;
    color: #000000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.15s ease, transform 0.1s ease;
  }

  .add-btn:hover,
  .mic-btn:hover { opacity: 0.75; }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:active { transform: scale(0.95); }

  .send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .add-btn:focus-visible,
  .mic-btn:focus-visible,
  .send-btn:focus-visible,
  form.composer textarea:focus-visible {
    outline: none;
  }

  @media (max-width: 480px) {
    header { padding: 20px 16px 14px; }
    .messages { padding: 16px; }
    form.composer { padding: 12px 16px 16px; }
    .model-tag { display: none; }
  }
</style>
</head>
<body>
  <div class="side-rail"></div>
  <div class="app">
    <header>
      <div class="eyebrow">本地訓練 · 字元級語言模型</div>
      <h1>山中問答</h1>
      <p>這裡的每一句回覆,都是 Python 訓練出來的小型模型即時生成的,不是查表得到的固定答案。</p>
    </header>

    <div class="messages" id="messages"></div>

    <form class="composer" id="composer">
      <div class="composer-pill">
        <textarea
          id="prompt"
          placeholder="想問啥就問啥"
          maxlength="200"
          required
        ></textarea>

        <div class="composer-toolbar">
          <!-- add:24x24,內縮20.83%/20.83%,實心白色「+」 -->
          <button type="button" class="add-btn" aria-label="新增附件" tabindex="-1">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M11 13H5V11H11V5H13V11H19V13H13V19H11V13Z" fill="white"/>
            </svg>
          </button>

          <div class="toolbar-right">
            <span class="model-tag">模型 5</span>

            <!-- Mic:16x16,內縮20.83%(左右)/4.17%(上下),1.6px白色線條 -->
            <button type="button" class="mic-btn" aria-label="語音輸入" tabindex="-1">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g clip-path="url(#clip0_78_23)">
                  <path d="M3.33337 6.66669V8.00002C3.33337 9.2377 3.82504 10.4247 4.70021 11.2999C5.57538 12.175 6.76236 12.6667 8.00004 12.6667C9.23772 12.6667 10.4247 12.175 11.2999 11.2999C12.175 10.4247 12.6667 9.2377 12.6667 8.00002V6.66669M8.00004 12.6667V15.3334M5.33337 15.3334H10.6667M8.00004 0.666687C7.46961 0.666687 6.9609 0.877401 6.58583 1.25247C6.21075 1.62755 6.00004 2.13625 6.00004 2.66669V8.00002C6.00004 8.53045 6.21075 9.03916 6.58583 9.41423C6.9609 9.78931 7.46961 10 8.00004 10C8.53047 10 9.03918 9.78931 9.41425 9.41423C9.78933 9.03916 10 8.53045 10 8.00002V2.66669C10 2.13625 9.78933 1.62755 9.41425 1.25247C9.03918 0.877401 8.53047 0.666687 8.00004 0.666687Z" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </g>
                <defs>
                  <clipPath id="clip0_78_23">
                    <rect width="16" height="16" fill="white"/>
                  </clipPath>
                </defs>
              </svg>
            </button>

            <!-- Ellipse 2(36x36 白底圓)+ Arrow up(24x24,內縮20.83%/20.83%,2.5px黑色線條) -->
            <button type="submit" class="send-btn" id="sendBtn" aria-label="送出">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 19V5M19 12L12 5L5 12" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("composer");
    const textarea = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, role) {
      const el = document.createElement("div");
      el.className = "msg " + role;
      if (role === "assistant") {
        const label = document.createElement("span");
        label.className = "label";
        label.textContent = "模型生成";
        el.appendChild(label);
        el.appendChild(document.createTextNode(text));
      } else {
        el.textContent = text;
      }
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function addLoading() {
      const el = document.createElement("div");
      el.className = "msg loading";
      el.innerHTML = '生成中 <span class="dots"><span></span><span></span><span></span></span>';
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    // Enter 送出,Shift+Enter 換行
    textarea.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const prompt = textarea.value.trim();
      if (!prompt) return;

      addMessage(prompt, "user");
      textarea.value = "";
      sendBtn.disabled = true;

      const loadingEl = addLoading();

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt }),
        });
        const data = await res.json();

        loadingEl.remove();

        if (!res.ok || data.error) {
          addMessage(data.error || "發生未知錯誤,請稍後再試。", "error");
        } else {
          addMessage(data.reply || "(模型沒有生成任何內容)", "assistant");
        }
      } catch (err) {
        loadingEl.remove();
        addMessage("無法連線到伺服器,請確認 server.py 是否正在執行。", "error");
      } finally {
        sendBtn.disabled = false;
        textarea.focus();
      }
    });
  </script>
</body>
</html>
